formatter = { command = "yapf" }

[[language]]
name = "ini"
scope = "source.ini"
file-types = [
  "ini",
  # Systemd unit files
  "service",
  "automount",
  "device",
  "mount",
  "path",
  "service",
  "slice",
  "socket",
  "swap",
  "target",
  "timer",
  # Podman quadlets
  "container",
  "volume",
  "kube",
  "network",
  { glob = ".editorconfig" },
  { glob = "rclone.conf" },
  "properties",
  "cfg",
  "directory",
  "conf",

  # === your specific .conf files or all ".conf" files ===
  # { glob = "some_file.conf" },
]
injection-regex = "ini"
comment-token = "#"
indent = { tab-width = 2, unit = "  " }

# ---- Biome LSP ---- #
[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

# --- ty --- #
[language-server.ty]
command = "ty"
args = ["server"]

[language-server.bash-language-server.config]
includeAllWorkspaceSymbols = true
backgroundAnalysisMaxFiles = 1000

# ---- Deno LSP ---- #
[language-server.deno-lsp]
command = "deno"
args = ["lsp"]
config.deno.enable = true

[language-server.rust-analyzer]
config = { checkOnSave = true, check = { command = "clippy" } }

# ---- simple completion language server ---- #
[language-server.scls]
command = "simple-completion-language-server"

[language-server.scls.config]
feature_words = false  # enable completion by word
feature_snippets = true  # enable snippets
snippets_first = true  # completions will return before snippets by default
snippets_inline_by_word_tail = true  # suggest snippets by WORD tail, for example text `xsq|` become `x^2|` when snippet `sq` has body `^2`
feature_unicode_input = false  # enable "unicode input"
feature_paths = true  # enable path completion
feature_citations = false  # enable citation completion (only on `citation` feature enabled)

# write logs to /tmp/completion.log
[language-server.scls.environment]
RUST_LOG = "info,simple-completion-language-server=info"
LOG_FILE = "/tmp/completion.log"

# ---- Emmet LSP ---- #
[language-server.emmet-lsp]
command = "emmet-language-server"
args = ["--stdio"]

# --- Vim script --- #
[language-server.vim-language-server]
command = "vim-language-server"
args = ["--stdio"]

[language-server.kotlin-lsp]
command = "kotlin-lsp"
args = ["--stdio"]

